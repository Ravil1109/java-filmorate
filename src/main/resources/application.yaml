logging.level.org.zalando.logbook: TRACE

server:
  port: 8080

spring:
  sql.init:
    mode: always
    schema-locations: classpath:h2/schema.sql
    data-locations: classpath:h2/data.sql
    encoding: UTF-8
  datasource:
    url: jdbc:h2:file:./db/filmorate
    driverClassName: org.h2.Driver
    username: sa
    password: password
